<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReady Home page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f9;
        }

        header {
            width: 100%;
            background-color: #0073e6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo a {
            font-size: 45px;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: #ffcc00;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin: 0 10px;
        }

        .nav-links a {
            color: white;
            font-size: 30px;
            text-decoration: none;
            padding: 10px 20px;
            background-color: #0073e6;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .nav-links a:hover {
            background-color: #005bb5;
        }

        .search-container {
            display: flex;
            align-items: center;
        }

        .search-container input[type="text"] {
            padding: 10px;
            border: none;
            border-radius: 4px;
            width: 300px;
            /* Increased width */
            height: 40px;
            /* Set a consistent height */
        }

        .search-btn {
            padding: 0 16px;
            /* Adjusted padding to fit better */
            border: none;
            background-color: #ffcc00;
            color: #333;
            border-radius: 4px;
            margin-left: 5px;
            cursor: pointer;
            height: 40px;
            /* Matching height with the input box */
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .search-btn:hover {
            background-color: #ff9900;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }

            .nav-links {
                flex-direction: column;
                margin-top: 10px;
            }

            .nav-links li {
                margin: 5px 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#">Med<span>Ready</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact Us</a></li>
                <li class="search-container">
                    <input type="text" placeholder="Search...">
                    <button class="search-btn">Search</button>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
